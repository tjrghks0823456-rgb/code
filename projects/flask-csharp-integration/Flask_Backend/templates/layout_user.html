<!-- /templates/layout_user.html -->
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "창고 시스템 사용자" }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f5f9;
            --sidebar-bg: #0f172a;
            --sidebar-text: #94a3b8;
            --sidebar-hover: #1e293b;
            --accent: #3b82f6;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            background: var(--bg-color);
            color: var(--text-main);
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            background: var(--sidebar-bg);
            color: white;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            margin: 0 0 40px 0;
            font-size: 1.2rem;
            color: white;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--sidebar-text);
            padding: 12px 15px;
            margin: 4px 0;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: var(--sidebar-hover);
            color: white;
        }

        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            height: 100vh;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #0f172a;
        }

        h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 15px 0;
            color: #334155;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        input,
        select {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>사용자 메뉴</h2>
        <a href="/user">📊 창고 현황</a>
        <a href="/user/reserve">📦 물건 보관 예약</a>
        <a href="/user/takeout">📤 물건 꺼내기</a>
        <a href="/logout">🚪 로그아웃</a>
    </div>
    <div class="main">
        {% block content %}{% endblock %}
    </div>
</body>

</html>
