{% extends "layout.html" %}
{% block content %}

<style>
    body { margin:0; font-family:'Segoe UI', Arial; background:#eef2f5; }
    .header {
        background:linear-gradient(135deg,#1e3a8a,#3b82f6);
        padding:30px; color:white; text-align:center;
        box-shadow:0 4px 10px rgba(0,0,0,0.2);
        border-radius:16px;
        margin-bottom:25px;
    }
    .layout { display:grid; grid-template-columns:2fr 1fr; gap:20px; max-width:1400px; margin:auto; }
    .warehouse-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; }
    .card {
        background:white; padding:20px; border-radius:16px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
        transition:0.2s;
    }
    .card:hover { transform:translateY(-4px); box-shadow:0 8px 18px rgba(0,0,0,0.15); }
    .log-box { height:450px; overflow-y:auto; background:white; padding:20px; border-radius:16px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
    .control-btn { padding:10px 15px; border:none; margin-top:10px; border-radius:8px; cursor:pointer; }
    .cool { background:#1e40af; color:white; }
    .warm { background:#ef4444; color:white; }
</style>

<div class="header">
    <h1>창고 관리 대시보드</h1>
    <p>{{ user }} 님 환영합니다 😊</p>
</div>

<div class="layout">

    <!-- 왼쪽 -->
    <div>
        <div class="warehouse-grid">
            <div class="card">
                <h2>❄ 냉동창고</h2>
                <p>목표 온도: -10℃</p>
                <p>현재 온도: <span id="freezer-temp">-</span>℃</p>
                <p>습도: <span id="freezer-hum">-</span>%</p>
                <button class="control-btn warm" onclick="adjustTemp('냉동창고', -12)">온도 내리기</button>
                <button class="control-btn cool" onclick="adjustTemp('냉동창고', -8)">온도 올리기</button>
            </div>

            <div class="card">
                <h2>🥶 냉장창고</h2>
                <p>목표 온도: 0℃</p>
                <p>현재 온도: <span id="fridge-temp">-</span>℃</p>
                <p>습도: <span id="fridge-hum">-</span>%</p>
            </div>

            <div class="card">
                <h2>📦 일반창고</h2>
                <p>목표 온도: 20℃</p>
                <p>현재 온도: <span id="normal-temp">-</span>℃</p>
                <p>습도: <span id="normal-hum">-</span>%</p>
            </div>
        </div>
    </div>

    <!-- 오른쪽 로그 -->
    <div>
        <div class="log-box" id="log-box">
            <h3>📜 실시간 로그</h3>
            <div id="logs"></div>
        </div>
    </div>

</div>

<script>
// 로그 기록
function logEvent(msg){
    const box=document.getElementById('logs');
    const t=document.createElement('p');
    t.textContent=`[LOG] ${msg}`;
    box.prepend(t);
}

// 온도 조절
function adjustTemp(room,temp){ logEvent(`${room} 온도 조절: ${temp}℃ 로 설정`); }

// 시뮬레이션 업데이트
setInterval(()=>{
    const fTemp=(Math.random()*4-12).toFixed(1);
    const fHum=(40+Math.random()*20).toFixed(1);
    document.getElementById('freezer-temp').innerText=fTemp;
    document.getElementById('freezer-hum').innerText=fHum;
    if(fTemp>-8) logEvent(`⚠ 냉동창고 온도 이상감지 (${fTemp}℃)`);

    document.getElementById('fridge-temp').innerText=(Math.random()*2).toFixed(1);
    document.getElementById('fridge-hum').innerText=(45+Math.random()*15).toFixed(1);

    document.getElementById('normal-temp').innerText=(20+Math.random()*3).toFixed(1);
    document.getElementById('normal-hum').innerText=(50+Math.random()*10).toFixed(1);

},1500);

// 실시간 물품 꺼내기 요청
async function fetchTakeouts(){
    try{
        const res=await fetch('/api/takeouts');
        const data=await res.json();
        data.forEach(r=>{
            if(!document.getElementById('takeout-'+r.id)){
                const p=document.createElement('p');
                p.id='takeout-'+r.id;
                p.innerHTML=`🟡 ${r.user} 요청: ${r.item_name || r.item}
                    <button onclick="processTakeout(${r.id}, 'approved')">승인</button>
                    <button onclick="processTakeout(${r.id}, 'rejected')">거부</button>`;
                document.getElementById('logs').prepend(p);
            }
        });
    }catch(e){ console.error(e); }
}

async function processTakeout(id,status){
    try{
        const res=await fetch('/api/takeouts/'+id,{
            method:'PATCH',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({status:status})
        });
        const r=await res.json();
        logEvent(`✅ ${r.user} ${r.item_name || r.item} 요청 ${r.status}`);
        const elem=document.getElementById('takeout-'+id);
        if(elem) elem.remove();
    }catch(e){ console.error(e); }
}

setInterval(fetchTakeouts,2000);
</script>

{% endblock %}
